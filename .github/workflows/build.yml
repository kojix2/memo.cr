name: Build

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-gnu
        include:
          - target: x86_64-pc-windows-gnu
            os: windows-latest

    runs-on: ${{ matrix.os }}

    env:
      BIN: memo
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup MSYS2 (Windows MinGW64)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-crystal
            mingw-w64-x86_64-shards
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-qt6-webview

      - name: Build on Windows (MinGW64)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: msys2 {0}
        run: |
          shards install --without-development --release
          shards build --release --static
          file bin/$BIN.exe
          bin/$BIN --help
          PKG=memo-${VERSION}-${{ matrix.target }}
          mkdir -p $PKG
          cp bin/$BIN.exe $PKG/
          cp LICENSE $PKG/ || echo "LICENSE file not found"
          cp README.md $PKG/ || echo "README.md file not found"
          zip -r $PKG.zip $PKG

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: memo-${{ matrix.target }}
          path: |
            *.zip
            *.tar.gz

